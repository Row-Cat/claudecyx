name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: ruff check
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .
      - name: pytest
        run: pytest -v
